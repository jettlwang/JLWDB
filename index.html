<!doctype html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JLWDB</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #ffffff;
    --fg: #1a1a1a;
    --muted: #666;
    --border: #ddd;
    --card: #f7f7f7;
    --accent: #2d6cdf;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #121212;
      --fg: #e8e8e8;
      --muted: #999;
      --border: #333;
      --card: #1c1c1c;
      --accent: #6ea8fe;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 2.5rem 1.25rem 4rem;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    line-height: 1.5;
  }
  main {
    max-width: 720px;
    margin: 0 auto;
  }
  h1 {
    font-size: 1.6rem;
    margin: 0 0 1.5rem;
  }
  .copy-box {
    display: flex;
    gap: 0.5rem;
    align-items: stretch;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.75rem;
    margin-bottom: 2.5rem;
  }
  .copy-box input {
    flex: 1;
    min-width: 0;
    background: transparent;
    border: none;
    color: var(--fg);
    font-size: 0.95rem;
    padding: 0.4rem 0.5rem;
  }
  .copy-box input:focus { outline: none; }
  .copy-box button {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 0.5rem 1rem;
    font-size: 0.9rem;
    cursor: pointer;
    white-space: nowrap;
  }
  .copy-box button:active { transform: scale(0.97); }
  h2 {
    font-size: 1.1rem;
    color: var(--muted);
    margin: 0 0 0.75rem;
    font-weight: 600;
  }
  ul.tree {
    list-style: none;
    margin: 0;
    padding: 0;
  }
  ul.tree li {
    border-bottom: 1px solid var(--border);
  }
  ul.tree a {
    display: block;
    padding: 0.85rem 0.25rem;
    color: var(--fg);
    text-decoration: none;
  }
  ul.tree a:hover {
    color: var(--accent);
  }
  ul.tree .fname {
    display: block;
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 0.15rem;
  }
</style>
</head>
<body>
<main>
  <h1>Ask your AI!</h1>

  <div class="copy-box">
    <!-- Static fallback for prompt box -->
    <input id="prompt-text" type="text" value="Summarize this essay series." readonly>
    <button id="copy-btn" type="button">Copy</button>
  </div>

  <h2>Essays</h2>
  <!-- Static HTML list that crawlers can read immediately -->
  <ul class="tree" id="file-list">
    <li>
      <a href="2026-07-14-threelayersocial-zh.md">
        从工业糖精到猴福子：三层社交回路决定纯线上AI社交情感赛道天花板
        <span class="fname">2026-07-14-threelayersocial-zh.md</span>
      </a>
    </li>
    <li>
      <a href="2026-06-19-hearmonkeythesis-zh.md">
        心猿整体论：红尘起舞，行在生活
        <span class="fname">2026-06-19-hearmonkeythesis-zh.md</span>
      </a>
    </li>
  </ul>
</main>

<script>
  // Append current URL dynamically for human users
  const promptInput = document.getElementById('prompt-text');
  promptInput.value = `Summarize this essay series. ${window.location.href}`;

  document.getElementById('copy-btn').addEventListener('click', async () => {
    const btn = document.getElementById('copy-btn');
    try {
      await navigator.clipboard.writeText(promptInput.value);
      btn.textContent = 'Copied!';
    } catch (e) {
      promptInput.select();
      document.execCommand('copy');
      btn.textContent = 'Copied!';
    }
    setTimeout(() => { btn.textContent = 'Copy'; }, 1500);
  });
</script>
</body>
</html>
